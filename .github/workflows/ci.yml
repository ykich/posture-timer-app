name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build (xcodebuild)
        run: |
          xcodebuild \
            -project PostureTimer.xcodeproj \
            -scheme PostureTimer \
            -configuration Debug \
            -derivedDataPath build/ \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build
